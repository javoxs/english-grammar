<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios de Gramática</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1a202c;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.75rem; margin-bottom: .4rem; }
    header p { color: var(--muted); max-width: 640px; margin: 0 auto; }

    .lang-nav {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .lang-nav button {
      font-family: inherit;
      font-size: .9rem;
      padding: .45rem 1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s, transform .1s;
    }
    .lang-nav button:hover { border-color: var(--primary); color: var(--text); }
    .lang-nav button:active { transform: scale(.97); }
    .lang-nav button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .quiz {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.25rem;
      max-width: 820px;
      margin: 0 auto;
    }
    .quiz-actions button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .quiz-info {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed var(--border);
    }

    .exercise {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
      background: #fefefe;
    }
    .exercise:last-child { margin-bottom: 0; }
    .exercise-number {
      font-weight: 700;
      color: var(--primary);
      margin-right: .35rem;
    }
    .exercise-row {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
    }
    .exercise-actions {
      display: flex;
      flex-shrink: 0;
      gap: .6rem;
    }
    .exercise-prompt {
      font-size: 1rem;
      line-height: 3.8;
      margin-bottom: .5rem;
      flex: 1;
    }
    .btn-hint {
      flex-shrink: 0;
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: .66rem;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-hint:hover { background: #fef08a; }
    .btn-hint:active { transform: scale(.92); }
    .btn-hint svg { width: 12px; height: 12px; }
    .btn-check {
      flex-shrink: 0;
      background: #dbeafe;
      border: 1px solid #93c5fd;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-check:hover { background: #bfdbfe; }
    .btn-check:active { transform: scale(.92); }
    .btn-check svg { width: 12px; height: 12px; }
    .btn-google {
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .btn-google:hover { background: #f8faff; box-shadow: 0 1px 4px rgba(60,64,67,.2); }
    .btn-google:active { transform: scale(.92); }
    .btn-google svg { width: 12px; height: 12px; }
    .btn-key {
      flex-shrink: 0;
      background: #ede9fe;
      border: 1px solid #c4b5fd;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-key:hover { background: #ddd6fe; }
    .btn-key:active { transform: scale(.92); }
    .btn-key svg { width: 12px; height: 12px; }
    .key-hint {
      display: none;
      margin-top: .5rem;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      border-left: 3px solid #7c3aed;
      border-radius: 6px;
      padding: .5rem .75rem;
      font-size: .85rem;
      color: #581c87;
      line-height: 1.5;
    }
    .key-hint.visible { display: block; }
    .key-hint::before { content: '\1F50D\00a0'; }
    .key-hint.empty {
      background: #f1f5f9;
      border-color: #e2e8f0;
      border-left-color: #94a3b8;
      color: var(--muted);
      font-style: italic;
    }
    .key-hint.empty::before { content: '\1F6AB\00a0'; }
    .exercise-prompt input {
      border: none;
      border-bottom: 2px solid #94a3b8;
      background: #f1f5f9;
      padding: .15rem .4rem;
      font-size: 1rem;
      font-family: inherit;
      min-width: 120px;
      text-align: center;
      border-radius: 4px 4px 0 0;
      transition: border-color .15s, background .15s;
    }
    .exercise-prompt input:focus {
      outline: none;
      border-bottom-color: var(--primary);
      background: #eff6ff;
    }
    .exercise-prompt input.correct {
      background: var(--success-bg);
      border-bottom-color: var(--success);
      color: #14532d;
    }
    .exercise-prompt input.incorrect {
      background: var(--error-bg);
      border-bottom-color: var(--error);
      color: #7f1d1d;
    }
    .exercise-prompt input.empty {
      background: #fef3c7;
      border-bottom-color: #f59e0b;
      color: #92400e;
    }
    .blank-wrap {
      position: relative;
      display: inline-block;
      vertical-align: baseline;
      margin: 0 .15rem;
    }
    .correct-hint {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: .78rem;
      font-weight: 600;
      color: var(--success);
      line-height: 1;
      margin-bottom: -12px;
      white-space: nowrap;
    }
    .correct-hint::before {
      content: '✓ ';
    }
    .blank-wrap.reviewing .correct-hint {
      display: block;
    }
    .verb-hint {
      font-size: .85rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: .75rem;
    }
    .feedback-panel {
      display: none;
      margin-top: .5rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: .75rem 1rem;
    }
    .feedback-panel.visible { display: block; }
    .feedback-panel .category-tag {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      padding: .15rem .55rem;
      border-radius: 999px;
      margin-bottom: .6rem;
    }
    .blank-feedback {
      font-size: .88rem;
      line-height: 1.55;
      padding: .35rem .6rem;
      border-radius: 4px;
      margin-bottom: .4rem;
    }
    .blank-feedback:last-child { margin-bottom: 0; }
    .blank-feedback.correct {
      color: #14532d;
      border-left: 3px solid var(--success);
    }
    .blank-feedback.incorrect {
      color: #7f1d1d;
      border-left: 3px solid var(--error);
    }
    .blank-feedback .fb-label {
      font-weight: 700;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: .2rem;
      opacity: .85;
    }
    .blank-status-row {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-bottom: .5rem;
    }
    .blank-status {
      font-size: .78rem;
      font-weight: 700;
      padding: .15rem .55rem;
      border-radius: 999px;
    }
    .blank-status.correct {
      color: #14532d;
      background: var(--success-bg);
    }
    .blank-status.incorrect {
      color: #7f1d1d;
      background: var(--error-bg);
    }
    button {
      font-family: inherit;
      font-size: .85rem;
      padding: .45rem .9rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    .btn-evaluate {
      background: var(--primary);
      color: #fff;
    }
    .btn-evaluate:hover { background: var(--primary-hover); }
    .btn-review {
      background: #e2e8f0;
      color: var(--text);
    }
    .btn-review:hover { background: #cbd5e1; }

    .quiz-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      justify-content: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 2px solid var(--border);
    }
    .quiz-actions button { padding: .6rem 1.2rem; font-size: .95rem; }
    .btn-new-quiz {
      background: #7c3aed;
      color: #fff;
    }
    .btn-new-quiz:hover { background: #6d28d9; }

    .global-score {
      text-align: center;
      margin-top: 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      min-height: 1.5em;
    }
    .global-score.perfect { color: var(--success); }
    .global-score.partial { color: #ca8a04; }
    .global-score.fail { color: var(--error); }
    .global-score.validation { color: #b45309; }

    .category-select {
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed var(--border);
    }
    .category-select-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: .7rem;
    }
    .category-select-title { font-weight: 700; font-size: .95rem; }
    .category-select-actions { display: flex; gap: .4rem; }
    .btn-chip-action {
      background: #e2e8f0;
      color: var(--text);
      font-size: .8rem;
      padding: .3rem .75rem;
    }
    .btn-chip-action:hover { background: #cbd5e1; }
    .chips { display: flex; flex-wrap: wrap; gap: .45rem; }
    .chip {
      font-family: inherit;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--muted);
      border-radius: 999px;
      padding: .35rem .8rem;
      font-size: .85rem;
      cursor: pointer;
      user-select: none;
      transition: background .15s, color .15s, border-color .15s, transform .1s;
    }
    .chip:hover { border-color: var(--primary); color: var(--text); }
    .chip:active { transform: scale(.96); }
    .chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .exercise-prompt input { min-width: 90px; font-size: .9rem; }
      .exercise-row { gap: .4rem; padding-right: .5rem; }
      .exercise-actions { flex-direction: column; gap: .4rem; }
      .exercise-actions button { width: 33px; height: 33px; }
      .exercise-actions button svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="lang-nav" aria-label="Idioma de los ejercicios">
      <button type="button" class="active" id="lang-english" aria-pressed="true">Ejercicios de inglés</button>
      <button type="button" id="lang-german" aria-pressed="false">Ejercicios de alemán</button>
    </nav>
    <h1 id="page-title">Ejercicios de Verbos en Inglés</h1>
    <p id="page-desc">Completa las 10 oraciones. Usa <strong>Evaluar</strong> para ver si acertaste (solo colores). Usa <strong>Feedback</strong> para ver explicaciones, categoría y respuestas correctas.</p>
  </header>
  <main id="app">
    <section class="quiz">
      <p class="quiz-info">Evaluación de 10 oraciones · seleccionadas al azar de las categorías elegidas</p>
      <div class="category-select" id="category-select">
        <div class="category-select-head">
          <span class="category-select-title">Categorías</span>
          <div class="category-select-actions">
            <button class="btn-chip-action" id="btn-cats-all" type="button">Todas</button>
            <button class="btn-chip-action" id="btn-cats-none" type="button">Ninguna</button>
          </div>
        </div>
        <div class="chips" id="category-chips"></div>
      </div>
      <div id="exercises-list"></div>
      <div class="quiz-actions">
        <button class="btn-evaluate" id="btn-evaluate" type="button">Evaluar</button>
        <button class="btn-review" id="btn-review" type="button">Feedback</button>
        <button class="btn-new-quiz" id="btn-new-quiz" type="button">Generar nueva evaluación</button>
      </div>
      <div class="global-score" id="global-score"></div>
    </section>
  </main>

  <script>
  const LANG = {
    english: {
      dataPath: 'data/english',
      pageTitle: 'Ejercicios de Verbos en Inglés',
      docTitle: 'Ejercicios de Verbos en Inglés',
      googleExam: 'inglés',
      hideHintCategories: ['Question Tags'],
      tenseNames: [
        'Present Perfect Continuous', 'Past Perfect Continuous', 'Future Perfect Continuous',
        'Present Continuous', 'Past Continuous', 'Future Continuous',
        'Present Perfect', 'Past Perfect', 'Future Perfect',
        'Present Simple', 'Past Simple', 'Future Simple',
        'Mixed Conditional', 'Zero Conditional', 'First Conditional', 'Second Conditional', 'Third Conditional',
        '1st Conditional', '2nd Conditional', '3rd Conditional', 'condicional'
      ]
    },
    german: {
      dataPath: 'data/german',
      pageTitle: 'Ejercicios de Gramática Alemana',
      docTitle: 'Ejercicios de Gramática Alemana',
      googleExam: 'alemán',
      hideHintCategories: [],
      tenseNames: [
        'Präsens', 'Praesens', 'Perfekt', 'Präteritum', 'Praeteritum', 'Futur I', 'Futur II',
        'Plusquamperfekt', 'Konjunktiv', 'Partizip II', 'Hilfsverb',
        'Modalverb', 'Modalverben', 'Nominativ', 'Akkusativ', 'Dativ', 'Genitiv'
      ]
    }
  };

  let currentLang = 'english';
  let CATEGORIES = [];
  let selectedCategoryIds = new Set();

  function getLangConfig() {
    return LANG[currentLang];
  }

  async function loadCategories() {
    const { dataPath } = getLangConfig();
    const manifestRes = await fetch(`${dataPath}/manifest.json`);
    if (!manifestRes.ok) throw new Error(`HTTP ${manifestRes.status}`);
    const manifest = await manifestRes.json();

    const categories = await Promise.all(
      manifest.categories.map(async (id) => {
        const res = await fetch(`${dataPath}/categories/${id}.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status} (${id})`);
        return res.json();
      })
    );
    CATEGORIES = categories;
  }

  function updateLangUI() {
    const cfg = getLangConfig();
    document.title = cfg.docTitle;
    document.getElementById('page-title').textContent = cfg.pageTitle;
    document.getElementById('lang-english').classList.toggle('active', currentLang === 'english');
    document.getElementById('lang-german').classList.toggle('active', currentLang === 'german');
    document.getElementById('lang-english').setAttribute('aria-pressed', currentLang === 'english');
    document.getElementById('lang-german').setAttribute('aria-pressed', currentLang === 'german');
  }

  // --- Utilities ---
  function normalize(str) {
    return str.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function checkAnswer(input, acceptedList) {
    if (!acceptedList || !Array.isArray(acceptedList)) return false;
    const val = normalize(input);
    return acceptedList.some(a => normalize(a) === val);
  }

  function buildPromptHTML(prompt) {
    const parts = prompt.split(/\{(\d+)\}/);
    let html = '';
    for (let i = 0; i < parts.length; i++) {
      if (i % 2 === 0) {
        html += escapeHTML(parts[i]);
      } else {
        const idx = parseInt(parts[i], 10);
        html += `<span class="blank-wrap" data-blank-wrap="${idx}"><span class="correct-hint"></span><input type="text" data-blank="${idx}" autocomplete="off" spellcheck="false" aria-label="Espacio ${idx + 1}"></span>`;
      }
    }
    return html;
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getWhyCorrect(item, blankIdx) {
    if (item.whyCorrect && item.whyCorrect[blankIdx]) return item.whyCorrect[blankIdx];
    return item.justification;
  }

  function buildReviewFeedback(item, blankIdx) {
    return getWhyCorrect(item, blankIdx);
  }

  function renderBlankFeedbacks(card, item) {
    const panel = card.querySelector('.feedback-panel');
    const inputs = [...card.querySelectorAll('input[data-blank]')];
    const multi = inputs.length > 1;
    const hasPerBlank = Array.isArray(item.whyCorrect);
    let html = `<div class="category-tag">${escapeHTML(item.categoryName)}</div>`;

    if (multi && hasPerBlank) {
      inputs.forEach(input => {
        const idx = parseInt(input.dataset.blank, 10);
        const isCorrect = checkAnswer(input.value, item.answers[idx]);
        const label = `<div class="fb-label">Espacio ${idx + 1}</div>`;
        const text = buildReviewFeedback(item, idx);
        html += `<div class="blank-feedback ${isCorrect ? 'correct' : 'incorrect'}">${label}${escapeHTML(text)}</div>`;
      });
    } else {
      if (multi) {
        const statuses = inputs.map(input => {
          const idx = parseInt(input.dataset.blank, 10);
          const isCorrect = checkAnswer(input.value, item.answers[idx]);
          return `<span class="blank-status ${isCorrect ? 'correct' : 'incorrect'}">Espacio ${idx + 1} ${isCorrect ? '\u2713' : '\u2717'}</span>`;
        }).join('');
        html += `<div class="blank-status-row">${statuses}</div>`;
      }
      const isCorrect = inputs.every(input => checkAnswer(input.value, item.answers[parseInt(input.dataset.blank, 10)]));
      html += `<div class="blank-feedback ${isCorrect ? 'correct' : 'incorrect'}">${escapeHTML(item.justification)}</div>`;
    }

    panel.innerHTML = html;
    panel.classList.add('visible');
  }

  function getAllInputs() {
    return [...document.querySelectorAll('#exercises-list input[data-blank]')];
  }

  function getEmptyInputs() {
    return getAllInputs().filter(input => !input.value.trim());
  }

  function markEmptyFields() {
    getAllInputs().forEach(input => {
      if (!input.value.trim()) {
        input.classList.add('empty');
      } else {
        input.classList.remove('empty');
      }
    });
  }

  function validateFilled() {
    markEmptyFields();
    const empty = getEmptyInputs();
    const scoreEl = document.getElementById('global-score');

    if (empty.length > 0) {
      const label = empty.length === 1 ? 'espacio' : 'espacios';
      scoreEl.textContent = `Completa todos los campos antes de continuar. Falta${empty.length === 1 ? '' : 'n'} ${empty.length} ${label} en blanco.`;
      scoreEl.className = 'global-score validation';
      empty[0].focus();
      return false;
    }

    return true;
  }

  function clearReviewState() {
    document.querySelectorAll('.feedback-panel').forEach(panel => {
      panel.classList.remove('visible');
      panel.innerHTML = '';
    });
    document.querySelectorAll('.blank-wrap.reviewing').forEach(wrap => {
      wrap.classList.remove('reviewing');
      wrap.querySelector('.correct-hint').textContent = '';
    });
  }

  function scoreInputs() {
    const cards = document.querySelectorAll('#exercises-list .exercise');
    let correctExercises = 0;

    cards.forEach((card, i) => {
      const item = currentQuiz[i];
      const inputs = card.querySelectorAll('input[data-blank]');
      let blanksCorrect = 0;

      inputs.forEach(input => {
        const idx = parseInt(input.dataset.blank, 10);
        input.classList.remove('empty');
        if (checkAnswer(input.value, item.answers[idx])) {
          input.classList.remove('incorrect');
          input.classList.add('correct');
          blanksCorrect++;
        } else {
          input.classList.remove('correct');
          input.classList.add('incorrect');
        }
      });

      if (blanksCorrect === item.answers.length) correctExercises++;
    });

    const scoreEl = document.getElementById('global-score');
    const total = currentQuiz.length;
    if (correctExercises === total) {
      scoreEl.textContent = `¡Perfecto! ${correctExercises}/${total} oraciones correctas.`;
      scoreEl.className = 'global-score perfect';
    } else if (correctExercises > 0) {
      scoreEl.textContent = `${correctExercises}/${total} oraciones correctas.`;
      scoreEl.className = 'global-score partial';
    } else {
      scoreEl.textContent = `0/${total} oraciones correctas.`;
      scoreEl.className = 'global-score fail';
    }
  }

  const QUIZ_SIZE = 10;

  function renderCategoryChips() {
    const container = document.getElementById('category-chips');
    container.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip' + (selectedCategoryIds.has(cat.id) ? ' selected' : '');
      const count = (cat.original ? cat.original.length : 0) + (cat.extra ? cat.extra.length : 0);
      chip.textContent = `${cat.name} (${count})`;
      chip.dataset.catId = cat.id;
      chip.setAttribute('aria-pressed', selectedCategoryIds.has(cat.id));
      chip.addEventListener('click', () => {
        if (selectedCategoryIds.has(cat.id)) {
          selectedCategoryIds.delete(cat.id);
        } else {
          selectedCategoryIds.add(cat.id);
        }
        chip.classList.toggle('selected');
        chip.setAttribute('aria-pressed', selectedCategoryIds.has(cat.id));
        newQuiz();
      });
      container.appendChild(chip);
    });
  }

  function setAllCategories(select) {
    selectedCategoryIds = select ? new Set(CATEGORIES.map(c => c.id)) : new Set();
    renderCategoryChips();
    newQuiz();
  }

  function getAllExercises() {
    const pool = [];
    CATEGORIES.filter(cat => selectedCategoryIds.has(cat.id)).forEach(cat => {
      [...cat.original, ...cat.extra].forEach(ex => {
        pool.push({
          ...ex,
          categoryName: cat.name,
          categoryExplanation: cat.explanation,
          keyHint: cat.keyHint
        });
      });
    });
    return pool;
  }

  function pickRandomQuiz(pool, count) {
    const shuffled = [...pool];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, Math.min(count, shuffled.length));
  }

  let currentQuiz = [];

  function renderExerciseCard(item, index) {
    const card = document.createElement('div');
    card.className = 'exercise';
    card.dataset.index = index;

    const hideHint = getLangConfig().hideHintCategories.includes(item.categoryName);
    const verbHint = hideHint ? '' : item.verbs.map(v => `(${v})`).join(' ');
    const hintHTML = hideHint ? '' : `<div class="verb-hint">${verbHint}</div>`;

    card.innerHTML = `
      <div class="exercise-row">
        <div class="exercise-prompt"><span class="exercise-number">${index + 1}.</span>${buildPromptHTML(item.prompt)}</div>
        <div class="exercise-actions">
        <button class="btn-check" type="button" tabindex="-1" title="Corregir esta pregunta" aria-label="Corregir esta pregunta">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>
        </button>
        <button class="btn-hint" type="button" tabindex="-1" title="Pista: revela una letra" aria-label="Pista">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a16207" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
        </button>
        <button class="btn-key" type="button" tabindex="-1" title="Pista: muestra la parte clave de la oración o el tipo de caso (sin la respuesta)" aria-label="Pista: parte clave de la oración o tipo de caso">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="btn-google" type="button" tabindex="-1" title="Preguntar en Google (modo IA) por qué tu respuesta es correcta o incorrecta" aria-label="Buscar en Google modo IA">
          <svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24s.85 6.91 2.34 9.88l7.35-5.7z"/><path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/></svg>
        </button>
        </div>
      </div>
      ${hintHTML}
      <div class="key-hint"></div>
      <div class="feedback-panel"></div>
    `;

    card.querySelector('.btn-check').addEventListener('click', () => checkSingleCard(card, item));
    card.querySelector('.btn-hint').addEventListener('click', () => revealHint(card, item));
    card.querySelector('.btn-key').addEventListener('click', () => revealKeyHint(card, item));
    card.querySelector('.btn-google').addEventListener('click', () => askGoogleAI(card, item));

    return card;
  }

  // Corta la justificación justo antes de que revele el tiempo verbal:
  // lo que ocurra primero entre "por lo tanto…" o el nombre de un tiempo.
  function keyCutPoint(j) {
    let idx = j.length;
    const plt = j.toLowerCase().search(/(;|\.|,|:)?\s*por lo tanto/);
    if (plt >= 0) idx = Math.min(idx, plt);
    for (const t of getLangConfig().tenseNames) {
      const k = j.indexOf(t);
      if (k >= 0) idx = Math.min(idx, k);
    }
    return idx;
  }

  // Devuelve los fragmentos citados de la oración que sirven de pista,
  // o null si el ejercicio no tiene una "clave" mostrable sin revelar el tiempo.
  function getKeyClue(item) {
    const j = (item.justification || '').trim();
    if (!/^La clave aquí es/i.test(j)) return null;
    const safe = j.slice(0, keyCutPoint(j));
    const quotes = [...safe.matchAll(/"([^"]+)"/g)].map(m => m[1].trim()).filter(Boolean);
    const unique = [...new Set(quotes)];
    return unique.length ? unique : null;
  }

  function revealKeyHint(card, item) {
    const panel = card.querySelector('.key-hint');
    if (panel.classList.contains('visible')) {
      panel.classList.remove('visible');
      return;
    }
    panel.classList.remove('empty');
    // Pista de caso (conditionals): describe el tipo de condicional sin revelar el verbo.
    if (item.keyHint) {
      panel.textContent = item.keyHint;
      panel.classList.add('visible');
      return;
    }
    const clue = getKeyClue(item);
    if (!clue) {
      panel.textContent = 'No puedo darte más pistas sin revelar el tiempo verbal.';
      panel.classList.add('empty');
    } else {
      panel.textContent = 'Fíjate en: ' + clue.map(c => `«${c}»`).join(', ');
    }
    panel.classList.add('visible');
  }

  function buildFilledSentence(card, item) {
    const inputs = [...card.querySelectorAll('input[data-blank]')];
    const values = {};
    inputs.forEach(input => {
      const idx = parseInt(input.dataset.blank, 10);
      values[idx] = input.value.trim();
    });
    return item.prompt.replace(/\{(\d+)\}/g, (_, n) => {
      const v = values[parseInt(n, 10)];
      return v ? v : '____';
    });
  }

  function askGoogleAI(card, item) {
    const sentence = buildFilledSentence(card, item);
    const tense = item.categoryName || 'tiempos verbales';
    const query = `En un examen de ${getLangConfig().googleExam} sobre ${tense}, ¿es correcta o incorrecta mi respuesta en la siguiente oración y por qué?: "${sentence}"`;
    // udm=50 abre el modo IA de Google
    const url = `https://www.google.com/search?udm=50&q=${encodeURIComponent(query)}`;
    window.open(url, '_blank', 'noopener');
  }

  function checkSingleCard(card, item) {
    renderBlankFeedbacks(card, item);

    const inputs = card.querySelectorAll('input[data-blank]');
    inputs.forEach(input => {
      const idx = parseInt(input.dataset.blank, 10);
      const wrap = input.closest('.blank-wrap');
      const hint = wrap.querySelector('.correct-hint');

      input.classList.remove('correct', 'incorrect', 'empty');
      if (!input.value.trim()) {
        input.classList.add('empty');
      } else if (checkAnswer(input.value, item.answers[idx])) {
        input.classList.add('correct');
      } else {
        input.classList.add('incorrect');
      }

      hint.textContent = item.answers[idx][0];
      wrap.classList.add('reviewing');
    });
  }

  function revealHint(card, item) {
    const inputs = [...card.querySelectorAll('input[data-blank]')];
    for (const input of inputs) {
      const idx = parseInt(input.dataset.blank, 10);
      const answer = item.answers[idx][0];
      if (!input._revealed) input._revealed = new Set();

      const hidden = [];
      for (let i = 0; i < answer.length; i++) {
        if (answer[i] !== ' ' && !input._revealed.has(i)) hidden.push(i);
      }
      if (hidden.length === 0) continue;

      const pos = hidden[Math.floor(Math.random() * hidden.length)];
      input._revealed.add(pos);

      let val = '';
      for (let i = 0; i < answer.length; i++) {
        if (answer[i] === ' ') val += ' ';
        else val += input._revealed.has(i) ? answer[i] : '_';
      }
      input.value = val;
      input.classList.remove('empty');
      return;
    }
  }

  function renderQuiz() {
    const list = document.getElementById('exercises-list');
    list.innerHTML = '';
    document.getElementById('global-score').textContent = '';
    document.getElementById('global-score').className = 'global-score';

    currentQuiz.forEach((item, i) => {
      list.appendChild(renderExerciseCard(item, i));
    });

    getAllInputs().forEach(input => {
      input.addEventListener('input', () => {
        if (input.value.trim()) input.classList.remove('empty');
      });
    });
  }

  function evaluateAll() {
    if (currentQuiz.length === 0) return;
    if (!validateFilled()) return;

    clearReviewState();
    scoreInputs();
  }

  function reviewAll() {
    if (currentQuiz.length === 0) return;
    if (!validateFilled()) return;

    clearReviewState();
    scoreInputs();

    const cards = document.querySelectorAll('#exercises-list .exercise');

    cards.forEach((card, i) => {
      const item = currentQuiz[i];

      renderBlankFeedbacks(card, item);

      const inputs = card.querySelectorAll('input[data-blank]');
      inputs.forEach(input => {
        const idx = parseInt(input.dataset.blank, 10);
        const wrap = input.closest('.blank-wrap');
        const hint = wrap.querySelector('.correct-hint');
        const isCorrect = checkAnswer(input.value, item.answers[idx]);

        input.classList.remove('correct', 'incorrect');
        input.classList.add(isCorrect ? 'correct' : 'incorrect');

        hint.textContent = item.answers[idx][0];
        wrap.classList.add('reviewing');
      });
    });
  }

  function newQuiz() {
    const pool = getAllExercises();
    if (pool.length === 0) {
      currentQuiz = [];
      renderQuiz();
      const scoreEl = document.getElementById('global-score');
      scoreEl.textContent = 'Selecciona al menos una categoría para generar la evaluación.';
      scoreEl.className = 'global-score validation';
      return;
    }
    currentQuiz = pickRandomQuiz(pool, QUIZ_SIZE);
    renderQuiz();
  }

  async function switchLanguage(lang) {
    if (lang === currentLang) return;
    currentLang = lang;
    updateLangUI();

    const scoreEl = document.getElementById('global-score');
    const buttons = document.querySelectorAll('.quiz-actions button');
    scoreEl.textContent = 'Cargando ejercicios…';
    scoreEl.className = 'global-score';
    buttons.forEach(b => { b.disabled = true; });
    clearReviewState();

    try {
      await loadCategories();
      selectedCategoryIds = new Set(CATEGORIES.map(c => c.id));
      renderCategoryChips();
      buttons.forEach(b => { b.disabled = false; });
      scoreEl.textContent = '';
      newQuiz();
    } catch (err) {
      console.error(err);
      scoreEl.textContent = 'No se pudieron cargar los ejercicios. Recarga la página.';
      scoreEl.className = 'global-score fail';
    }
  }

  async function init() {
    const scoreEl = document.getElementById('global-score');
    const buttons = document.querySelectorAll('.quiz-actions button');

    document.getElementById('btn-evaluate').addEventListener('click', evaluateAll);
    document.getElementById('btn-review').addEventListener('click', reviewAll);
    document.getElementById('btn-new-quiz').addEventListener('click', newQuiz);
    document.getElementById('btn-cats-all').addEventListener('click', () => setAllCategories(true));
    document.getElementById('btn-cats-none').addEventListener('click', () => setAllCategories(false));
    document.getElementById('lang-english').addEventListener('click', () => switchLanguage('english'));
    document.getElementById('lang-german').addEventListener('click', () => switchLanguage('german'));

    updateLangUI();
    scoreEl.textContent = 'Cargando ejercicios…';
    buttons.forEach(b => { b.disabled = true; });

    try {
      await loadCategories();
      selectedCategoryIds = new Set(CATEGORIES.map(c => c.id));
      renderCategoryChips();
      buttons.forEach(b => { b.disabled = false; });
      scoreEl.textContent = '';
      newQuiz();
    } catch (err) {
      console.error(err);
      scoreEl.textContent = 'No se pudieron cargar los ejercicios. Recarga la página.';
      scoreEl.className = 'global-score fail';
    }
  }

  init();
  </script>
